name: Build Testcases Archives

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Create archives
        run: |
          mkdir -p dist
          
          # Create zip for each testcase directory
          for dir in testcases/*/; do
            dirname=$(basename "$dir")
            echo "Creating archive for $dirname..."
            (cd testcases && zip -r "../dist/athena-testcases-${dirname}.zip" "$dirname")
          done
          
          # Create a combined archive with all testcases
          echo "Creating combined archive..."
          zip -r dist/athena-testcases-all.zip testcases/
          
          # List created archives
          echo "Created archives:"
          ls -lh dist/

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          fail_on_unmatched_files: true

      - name: Upload artifacts (for workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: testcases-archives
          path: dist/*.zip
          retention-days: 30
